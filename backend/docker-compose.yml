version: '3.9'

services:
  db:
    image: postgres:16-alpine
    container_name: ibps-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ibps_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Myraaa@13
    ports:
      - "1327:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: ibps-backend
    restart: unless-stopped
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # Optional: Ollama for local inference
  ollama:
    image: ollama/ollama:latest
    container_name: ibps-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

volumes:
  postgres_data:
  ollama_data: